<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Sistema Ventas</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.sidebar{
height:100vh;
background:#2c3e50;
color:white;
padding:20px;
}

.sidebar button{
width:100%;
margin-bottom:10px;
}

.card-total{
font-size:40px;
font-weight:bold;
text-align:center;
padding:30px;
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<div class="col-2 sidebar">

<h4>Sistema</h4>

<button class="btn btn-light" onclick="mostrarSeccion('ventas')">Ventas</button>

<button class="btn btn-light" onclick="mostrarSeccion('inventario')">Inventario</button>

<button class="btn btn-light" onclick="mostrarSeccion('historial')">Historial</button>

</div>


<div class="col-10 p-4">

<!-- VENTAS -->

<div id="ventas">

<h3>Registrar venta</h3>

<input id="buscarProducto" list="listaProductos" class="form-control mb-2" placeholder="Buscar producto">

<datalist id="listaProductos"></datalist>

<input id="cantidad" type="number" class="form-control mb-2" placeholder="Cantidad">

<button class="btn btn-primary mb-3" onclick="agregarCarrito()">Agregar al carrito</button>

<div class="card card-total mb-3">

Total: $<span id="totalVenta">0</span>

</div>

<h4>Carrito</h4>

<ul id="listaCarrito" class="list-group mb-3"></ul>

<button class="btn btn-success" onclick="confirmarVenta()">Confirmar venta</button>

</div>



<!-- INVENTARIO -->

<div id="inventario" style="display:none">

<h3>Inventario</h3>

<div class="card p-3 mb-4">

<h5>Agregar nuevo producto</h5>

<input id="nuevoNombre" class="form-control mb-2" placeholder="Nombre producto">

<input id="nuevoPrecio" type="number" class="form-control mb-2" placeholder="Precio">

<input id="nuevoStock" type="number" class="form-control mb-2" placeholder="Stock inicial">

<input id="nuevoMinimo" type="number" class="form-control mb-2" placeholder="Stock mínimo">

<button class="btn btn-primary" onclick="agregarProducto()">Guardar producto</button>

</div>

<ul id="listaInventario" class="list-group"></ul>

</div>



<!-- HISTORIAL -->

<div id="historial" style="display:none">

<h3>Historial ventas</h3>

<input type="date" id="fechaFiltro" class="form-control mb-3">

<button class="btn btn-primary mb-3" onclick="buscarVentasPorFecha()">Buscar</button>

<ul id="listaVentas" class="list-group"></ul>

</div>


</div>

</div>

</div>



<script>

const supabaseUrl="https://lvtjeeokpejdexlsshqa.supabase.co"
const supabaseKey="sb_publishable_ZPGnGr1Tv0hKf6D_yWH2Ug_r2ro954H"

const client=supabase.createClient(supabaseUrl,supabaseKey)

let productos=[]
let carrito=[]
let productoSeleccionado=null



function mostrarSeccion(seccion){

document.getElementById("ventas").style.display="none"
document.getElementById("inventario").style.display="none"
document.getElementById("historial").style.display="none"

document.getElementById(seccion).style.display="block"

}



async function cargarProductos(){

const {data}=await client
.from("productos")
.select("*")
.order("nombre")

productos=data

const datalist=document.getElementById("listaProductos")
const listaInventario=document.getElementById("listaInventario")

datalist.innerHTML=""
listaInventario.innerHTML=""

data.forEach(p=>{

datalist.innerHTML+=`<option value="${p.nombre}">`

let alerta=""

if(p.stock <= p.stock_minimo){

alerta=` <span style="color:red;font-weight:bold">⚠ STOCK BAJO</span>`

}

listaInventario.innerHTML+=`

<li class="list-group-item d-flex justify-content-between">

<div>

${p.nombre} - $${p.precio} - Stock ${p.stock} ${alerta}

</div>

<button class="btn btn-warning btn-sm" onclick="reponer(${p.id},${p.stock},${p.precio})">

Reponer

</button>

</li>

`

})

}



async function agregarProducto(){

const nombre=document.getElementById("nuevoNombre").value
const precio=document.getElementById("nuevoPrecio").value
const stock=document.getElementById("nuevoStock").value
const minimo=document.getElementById("nuevoMinimo").value

if(!nombre || !precio){

alert("Completar nombre y precio")
return

}

await client
.from("productos")
.insert({

nombre:nombre,
precio:precio,
stock:stock,
stock_minimo:minimo

})

document.getElementById("nuevoNombre").value=""
document.getElementById("nuevoPrecio").value=""
document.getElementById("nuevoStock").value=""
document.getElementById("nuevoMinimo").value=""

cargarProductos()

}



document.getElementById("buscarProducto").addEventListener("input",function(){

const nombre=this.value
productoSeleccionado=productos.find(p=>p.nombre===nombre)

})



function agregarCarrito(){

const cantidad=parseInt(document.getElementById("cantidad").value)

if(!productoSeleccionado){
alert("Seleccione producto")
return
}

if(cantidad>productoSeleccionado.stock){
alert("Stock insuficiente")
return
}

const subtotal=productoSeleccionado.precio*cantidad

carrito.push({

producto_id:productoSeleccionado.id,
nombre:productoSeleccionado.nombre,
precio:productoSeleccionado.precio,
cantidad:cantidad,
subtotal:subtotal

})

renderCarrito()

document.getElementById("buscarProducto").value=""
document.getElementById("cantidad").value=""

productoSeleccionado=null

}



function renderCarrito(){

const lista=document.getElementById("listaCarrito")

lista.innerHTML=""

let total=0

carrito.forEach(i=>{

total+=i.subtotal

lista.innerHTML+=`

<li class="list-group-item">

${i.nombre} x${i.cantidad} - $${i.subtotal}

</li>

`

})

document.getElementById("totalVenta").textContent=total

}



async function confirmarVenta(){

if(carrito.length==0){

alert("Carrito vacío")
return

}

for(const item of carrito){

await client
.from("ventas")
.insert({

producto_id:item.producto_id,
nombre_producto:item.nombre,
precio_unitario:item.precio,
precio_total:item.subtotal

})

const prod=productos.find(p=>p.id==item.producto_id)

const nuevoStock=prod.stock-item.cantidad

await client
.from("productos")
.update({stock:nuevoStock})
.eq("id",item.producto_id)

}

carrito=[]

renderCarrito()

cargarProductos()

verVentas()

}



async function reponer(id,stockActual,precioActual){

const cantidad=parseInt(prompt("Cantidad a agregar"))

if(!cantidad) return

const nuevoStock=stockActual+cantidad

const nuevoPrecio=prompt("Nuevo precio (enter para dejar igual)",precioActual)

await client
.from("productos")
.update({

stock:nuevoStock,
precio:nuevoPrecio?nuevoPrecio:precioActual

})
.eq("id",id)

cargarProductos()

}



async function verVentas(){

const {data}=await client
.from("ventas")
.select("*")
.order("created_at",{ascending:false})

const lista=document.getElementById("listaVentas")

lista.innerHTML=""

data.forEach(v=>{

const fecha=new Date(v.created_at).toLocaleString()

lista.innerHTML+=`

<li class="list-group-item">

${v.nombre_producto} - $${v.precio_total} - ${fecha}

</li>

`

})

}



async function buscarVentasPorFecha(){

const fecha=document.getElementById("fechaFiltro").value

if(!fecha){

verVentas()
return

}

const inicio=fecha+"T00:00:00"
const fin=fecha+"T23:59:59"

const {data}=await client
.from("ventas")
.select("*")
.gte("created_at",inicio)
.lte("created_at",fin)
.order("created_at",{ascending:false})

const lista=document.getElementById("listaVentas")

lista.innerHTML=""

data.forEach(v=>{

const fechaVenta=new Date(v.created_at).toLocaleString()

lista.innerHTML+=`

<li class="list-group-item">

${v.nombre_producto} - $${v.precio_total} - ${fechaVenta}

</li>

`

})

}



cargarProductos()
verVentas()

</script>

</body>
</html>
